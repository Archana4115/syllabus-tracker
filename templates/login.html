{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffffff, #27F5CC);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.login-container {
    background: white;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 90%;
    max-width: 350px;
    text-align: center;

    animation: fadeIn 1s ease;
}

/* TITLE */
.login-container h2 {
    margin-bottom: 20px;
}

/* INPUT */
.login-container input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #ddd;
    outline: none;
}

/* BUTTON */
.login-container button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #27F5CC;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER */
.login-container button:hover {
    transform: translateY(-3px);
    background: #1edbb6;
}

/* ERROR */
.error {
    color: red;
    margin-top: 10px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 768px) {
    .login-container {
        padding: 25px;
    }
}

</style>

</head>

<body>

<div class="login-container">

<h2>🔐 Login</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
