{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>Teacher Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #F1EAFF;
}

/* MAIN */
.main {
    max-width: 800px;
    margin: 30px auto;
    padding: 20px;
}

/* TITLE */
h2 {
    margin-bottom: 5px;
}

p {
    margin-bottom: 20px;
}

/* GRID */
.student-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    text-align: center;
    transition: 0.3s;
    animation: fadeUp 0.5s ease;
}

.card:hover {
    transform: translateY(-5px);
}

/* USERNAME */
.card h3 {
    margin-bottom: 15px;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 15px;
    background: #D0A2F7;
    border-radius: 10px;
    text-decoration: none;
    color: black;
    transition: 0.3s;
}

.btn:hover {
    background: #DCBFFF;
    transform: scale(1.05);
}

/* EMPTY */
.empty {
    text-align: center;
    color: gray;
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .student-grid {
        grid-template-columns: 1fr;
    }

    .main {
        padding: 10px;
    }

}

</style>

</head>

<body>

<div class="main">

<h2>👨‍🎓 Your Students</h2>
<p style="color:gray;">Select a student to start chat</p>

<div class="student-grid">

{% for student in students %}

<div class="card">

<h3>{{ student.username }}</h3>

<a href="/chat/{{ student.id }}/" class="btn">
💬 Start Chat
</a>

</div>

{% empty %}
<p class="empty">No students found</p>
{% endfor %}

</div>

</div>

</body>
</html>
