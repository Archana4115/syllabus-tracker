{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>Teacher Report</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body {
    background:#F1EAFF;
    font-family:Poppins;
}

.container {
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.card {
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.btn{
    background:#D0A2F7;
    padding:12px 18px;
    border-radius:10px;
    text-decoration:none;
    color:black;
    display:inline-block;
    margin-top:15px;
    transition:0.3s;
}

.btn:hover{
    background:#DCBFFF;
}
</style>

</head>

<body>

<div class="container">

<h2>📄 Teacher Reports</h2>

{% for c in courses %}
<div class="card">
    <h3>{{ c.course_name }}</h3>
    <p>Completion: {{ c.course_name }}</p>
</div>
{% endfor %}

<a href="/report/download/" class="btn">Download Report</a>
<a href="/report/download-pdf/" class="btn">
    Download PDF Report
</a>
</div>

</body>
</html>
