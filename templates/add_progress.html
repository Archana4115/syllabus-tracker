{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>Add Progress</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
    margin: 0;
    background: #F1EAFF;
    font-family: 'Poppins', sans-serif;
}

/* CONTAINER */
.form-container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.05);
    animation: fadeUp 0.6s ease;
}

/* HEADING */
.form-container h2 {
    margin-bottom: 20px;
}

/* LABEL */
.form-container label {
    font-weight: 500;
    margin-bottom: 5px;
    display: block;
}

/* INPUTS */
.form-container input,
.form-container select,
.form-container textarea {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #E5D4FF;
    margin-bottom: 15px;
    outline: none;
    transition: 0.3s;
    font-family: inherit;
    box-sizing: border-box;
}

/* INPUT FOCUS */
.form-container input:focus,
.form-container select:focus,
.form-container textarea:focus {
    border-color: #D0A2F7;
    box-shadow: 0 0 5px rgba(208,162,247,0.4);
}

/* TEXTAREA */
.form-container textarea {
    resize: none;
}

/* BUTTON */
.form-container button {
    background: #D0A2F7;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER */
.form-container button:hover {
    background: #DCBFFF;
    transform: translateY(-2px);
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .form-container {
        margin: 20px;
        padding: 20px;
    }

}

</style>

</head>

<body>

<div class="form-container">

<h2>📊 Add Daily Progress</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Topic</label>
    <select name="topic">
        {% for topic in topics %}
            <option value="{{ topic.id }}">{{ topic.topic_name }}</option>
        {% endfor %}
    </select>

    <label>Date</label>
    <input type="date" name="date" required>

    <label>Lectures Covered</label>
    <input type="number" step="0.5" name="lectures" placeholder="e.g. 1.5" required>

    <label>Notes</label>
    <textarea name="notes" placeholder="Write notes..."></textarea>

    <label>Attachment</label>
    <input type="file" name="attachment">

    <button type="submit">Save Progress</button>

</form>

</div>

</body>
</html>
