{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #F1EAFF, #E5D4FF);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.login-container {
    background: white;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    width: 90%;
    max-width: 350px;
    text-align: center;

    animation: fadeIn 1s ease;
}

/* TITLE */
.login-container h2 {
    margin-bottom: 20px;
}

/* INPUT */
.login-container input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #DCBFFF;
    outline: none;
    box-sizing: border-box; /* FIX */
}

/* BUTTON */
.login-container button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #D0A2F7;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
    box-sizing: border-box; /* FIX */
}

.login-container button:hover {
    transform: translateY(-3px);
    background: #DCBFFF;
}

/* ERROR */
.error {
    color: red;
    margin-top: 10px;
}

/* LINK */
.link {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    color: #D0A2F7;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 768px) {
    .login-container {
        padding: 25px;
    }
}

</style>

</head>

<body>

<div class="login-container">

<h2>👨‍🎓 Student Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>

    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

<a href="/accounts/teacher/login/" class="link">
👨‍🏫 Login as Teacher
</a>

</div>

</body>
</html>
