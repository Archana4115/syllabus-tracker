{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>Select Chat</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="stylesheet" href="{% static 'css/chat_select.css' %}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="chat-select-container">

    <!-- TITLE -->
    <div class="page-title">

        <h2>Select Course</h2>

        <p>Choose a teacher to start chatting</p>

    </div>

    <!-- GRID -->
    <div class="chat-grid">

        {% for enroll in enrollments %}

        <div class="chat-card">

            <h3>{{ enroll.course.course_name }}</h3>

            <p>
                Teacher:
                <span>{{ enroll.course.teacher.username }}</span>
            </p>

            <a href="/chat/{{ enroll.course.teacher.id }}/" class="chat-btn">

                Start Chat

            </a>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
